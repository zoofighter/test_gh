# 주식 랭킹 뉴스 시스템 설정

# DART 공시 API
dart:
  api_key: "YOUR_DART_API_KEY"  # https://opendart.fss.or.kr 에서 발급

# 뉴스 수집 설정
collectors:
  naver:
    enabled: true
    max_pages: 3
  dart:
    enabled: true
  yahoo:
    enabled: true
  rss:
    enabled: true
    feeds:
      - name: "한국경제"
        url: "https://www.hankyung.com/feed/stock"
      - name: "매일경제"
        url: "https://www.mk.co.kr/rss/30100041/"
  twitter:
    enabled: false  # Nitter 인스턴스 가용 시 true로 변경
    search_queries: ["코스피", "코스닥", "$AAPL", "$TSLA"]
    max_per_query: 10
  naver_discussion:
    enabled: false  # 관심 종목 설정 후 true로 변경
    max_pages: 2
    min_views: 500
  google_news:
    enabled: true
    feeds: ["kr_business", "us_business"]
    search_queries: []
  reddit:
    enabled: true
    subreddits: ["stocks", "wallstreetbets", "investing"]
    min_score: 50
    limit: 25

# 대상 종목
watchlist:
  kr:
    - "005930"   # 삼성전자
    - "000660"   # SK하이닉스
    - "373220"   # LG에너지솔루션
    - "005380"   # 현대차
    - "035420"   # NAVER
  us:
    - "AAPL"     # 애플
    - "TSLA"     # 테슬라
    - "NVDA"     # 엔비디아
    - "MSFT"     # 마이크로소프트
    - "AMZN"     # 아마존

# 랭킹 설정
ranking:
  top_n: 30
  news_batch_size: 20
  max_news_per_stock: 10
  stock_level_enabled: true
  weights:
    coverage: 25
    keyword: 25
    volume: 25
    source: 25

# 로컬 LLM (LM Studio) - 선택사항
lm_studio:
  base_url: "http://localhost:1234/v1"
  api_key: "lm-studio"
  model: "local-model"
  temperature: 0.1

# 온라인 LLM 폴백 - 선택사항
online_llm:
  enabled: false
  provider: "openai"    # openai 또는 anthropic
  api_key: "YOUR_API_KEY"
  model: "gpt-4o-mini"
  temperature: 0.1
  max_tokens: 4096

# DB 설정
database:
  path: "data/stock_ranking.db"
